name: Release Monitor Scheduled

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo
          pip install --no-cache-dir -r requirements.txt

      - name: Run Release Monitor
        run: python release_monitor.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          MY_REPO: ${{ secrets.MY_REPO }}
          LOGLEVEL: "INFO"
          CONFIG_PATH: "." 

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # We checken nu in de root omdat CONFIG_PATH op "." staat
          if [ -f "releases.json" ]; then
            git add releases.json
            git diff --staged --quiet || (git commit -m "chore: update releases.json state [skip ci]" && git push)
          fi